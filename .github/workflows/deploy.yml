name: 🚀 Deploy DockRx — Full Stack

# ─────────────────────────────────────────────────────────────────────
# TRIGGERS: Runs on every push to main branch
#           Can also be triggered manually from GitHub Actions tab
# ─────────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
  workflow_dispatch:      # Allows manual trigger from GitHub UI
    inputs:
      deploy_target:
        description: 'What to deploy'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - frontend
          - admin
          - backend

# ─────────────────────────────────────────────────────────────────────
# CONCURRENCY: Cancel any in-progress deploy if a new push arrives
# ─────────────────────────────────────────────────────────────────────
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ═══════════════════════════════════════════════════════════════════
  # JOB 1 — DEPLOY PATIENT FRONTEND TO CLOUDFLARE PAGES
  # ═══════════════════════════════════════════════════════════════════
  deploy-frontend:
    name: 🌐 Frontend → Cloudflare Pages
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event.inputs.deploy_target == 'all' ||
      github.event.inputs.deploy_target == 'frontend'

    steps:
      # 1. Pull source code
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Node.js with caching
      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # 3. Install dependencies
      - name: 📦 Install dependencies
        working-directory: ./frontend
        run: npm ci

      # 4. Build the React app (injects env vars at build time)
      - name: 🔨 Build frontend
        working-directory: ./frontend
        env:
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}
          VITE_CURRENCY: ${{ secrets.VITE_CURRENCY }}
        run: npm run build

      # 5. Deploy built files to Cloudflare Pages
      - name: ☁️ Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: dockrx-frontend           # ← Must match your Pages project name
          directory: frontend/dist               # ← Vite build output folder
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      # 6. Print success summary
      - name: ✅ Frontend deployed
        run: |
          echo "========================================"
          echo "  ✅ Patient frontend deployed!"
          echo "  🔗 https://dockrx-frontend.pages.dev"
          echo "========================================"


  # ═══════════════════════════════════════════════════════════════════
  # JOB 2 — DEPLOY ADMIN PANEL TO CLOUDFLARE PAGES
  # ═══════════════════════════════════════════════════════════════════
  deploy-admin:
    name: 🔐 Admin Panel → Cloudflare Pages
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event.inputs.deploy_target == 'all' ||
      github.event.inputs.deploy_target == 'admin'

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      - name: 📦 Install dependencies
        working-directory: ./admin
        run: npm ci

      - name: 🔨 Build admin panel
        working-directory: ./admin
        env:
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}
          VITE_CURRENCY: ${{ secrets.VITE_CURRENCY }}
        run: npm run build

      - name: ☁️ Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: dockrx-admin              # ← Must match your Pages project name
          directory: admin/dist                  # ← Vite build output folder
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Admin panel deployed
        run: |
          echo "========================================"
          echo "  ✅ Admin panel deployed!"
          echo "  🔗 https://dockrx-admin.pages.dev"
          echo "========================================"


  # ═══════════════════════════════════════════════════════════════════
  # JOB 3 — TRIGGER RAILWAY BACKEND REDEPLOY
  # ═══════════════════════════════════════════════════════════════════
  deploy-backend:
    name: ⚙️ Backend → Railway
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event.inputs.deploy_target == 'all' ||
      github.event.inputs.deploy_target == 'backend'

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      # Railway watches GitHub and auto-deploys on push.
      # This step also explicitly pings the Railway deploy webhook
      # for cases where you trigger from workflow_dispatch.
      - name: 🚂 Trigger Railway deploy webhook
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RAILWAY_WEBHOOK_URL }}")
          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "202" ]; then
            echo "✅ Railway webhook triggered (HTTP $HTTP_STATUS)"
          else
            echo "⚠️  Railway webhook returned HTTP $HTTP_STATUS"
            echo "   Railway may still auto-deploy via GitHub integration."
          fi

      - name: ✅ Backend deploy triggered
        run: |
          echo "========================================"
          echo "  ✅ Backend redeploy triggered!"
          echo "  🔗 https://dockrx-production.up.railway.app"
          echo "========================================"


  # ═══════════════════════════════════════════════════════════════════
  # JOB 4 — SUMMARY NOTIFICATION (runs after all three deploys)
  # ═══════════════════════════════════════════════════════════════════
  notify-success:
    name: 📢 Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-admin, deploy-backend]
    if: always()

    steps:
      - name: 📋 Print deployment summary
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════╗"
          echo "║       🏥  DockRx Deployment Summary          ║"
          echo "╠══════════════════════════════════════════════╣"
          echo "║  Commit : ${{ github.sha }}"
          echo "║  Branch : ${{ github.ref_name }}"
          echo "║  Author : ${{ github.actor }}"
          echo "╠══════════════════════════════════════════════╣"
          echo "║  🌐 Frontend  → dockrx-frontend.pages.dev   ║"
          echo "║  🔐 Admin     → dockrx-admin.pages.dev      ║"
          echo "║  ⚙️  Backend   → railway.app                 ║"
          echo "╚══════════════════════════════════════════════╝"
