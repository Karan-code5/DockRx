name: Deploy DockRx to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: What to deploy
        required: false
        default: all
        type: choice
        options: [all, frontend, admin, backend]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-frontend:
    name: Frontend to Cloudflare Pages
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event.inputs.deploy_target == 'all' ||
      github.event.inputs.deploy_target == 'frontend'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        env:
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}
          VITE_CURRENCY: ${{ secrets.VITE_CURRENCY }}
          VITE_RAZORPAY_KEY_ID: ${{ secrets.VITE_RAZORPAY_KEY_ID }}
        run: npm run build

      - name: Deploy frontend to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: dockrx-frontend
          directory: frontend/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  deploy-admin:
    name: Admin to Cloudflare Pages
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event.inputs.deploy_target == 'all' ||
      github.event.inputs.deploy_target == 'admin'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        working-directory: ./admin
        run: npm ci

      - name: Build admin
        working-directory: ./admin
        env:
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}
          VITE_CURRENCY: ${{ secrets.VITE_CURRENCY }}
        run: npm run build

      - name: Deploy admin to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: dockrx-admin
          directory: admin/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  deploy-backend:
    name: Backend to Cloudflare Workers
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event.inputs.deploy_target == 'all' ||
      github.event.inputs.deploy_target == 'backend'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Write Worker secrets file
        working-directory: ./backend
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          CURRENCY: ${{ secrets.CURRENCY }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          ADMIN_URL: ${{ secrets.ADMIN_URL }}
        run: |
          jq -n \
            --arg MONGODB_URI "$MONGODB_URI" \
            --arg JWT_SECRET "$JWT_SECRET" \
            --arg ADMIN_EMAIL "$ADMIN_EMAIL" \
            --arg ADMIN_PASSWORD "$ADMIN_PASSWORD" \
            --arg CURRENCY "$CURRENCY" \
            --arg RAZORPAY_KEY_ID "$RAZORPAY_KEY_ID" \
            --arg RAZORPAY_KEY_SECRET "$RAZORPAY_KEY_SECRET" \
            --arg STRIPE_SECRET_KEY "$STRIPE_SECRET_KEY" \
            --arg FRONTEND_URL "$FRONTEND_URL" \
            --arg ADMIN_URL "$ADMIN_URL" \
            '{
              MONGODB_URI: $MONGODB_URI,
              JWT_SECRET: $JWT_SECRET,
              ADMIN_EMAIL: $ADMIN_EMAIL,
              ADMIN_PASSWORD: $ADMIN_PASSWORD,
              CURRENCY: $CURRENCY,
              RAZORPAY_KEY_ID: $RAZORPAY_KEY_ID,
              RAZORPAY_KEY_SECRET: $RAZORPAY_KEY_SECRET,
              STRIPE_SECRET_KEY: $STRIPE_SECRET_KEY,
              FRONTEND_URL: $FRONTEND_URL,
              ADMIN_URL: $ADMIN_URL
            }' > .worker-secrets.json

      - name: Deploy backend to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: backend
          command: deploy --secrets-file .worker-secrets.json

  summary:
    name: Deployment summary
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-admin, deploy-backend]
    if: always()

    steps:
      - name: Print summary
        run: |
          echo "DockRx deployment finished for commit ${{ github.sha }}"
          echo "Frontend project: dockrx-frontend"
          echo "Admin project: dockrx-admin"
          echo "Backend Worker: dockrx"
